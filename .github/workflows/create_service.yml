name: Create New Service
on:
  workflow_dispatch:
    inputs:
      port_payload:
        description: 'Port Payload'
        required: true

jobs:
  create-service:
    runs-on: ubuntu-latest
    steps:
      - name: Log Port Payload
        run: |
          echo "Received payload from Port: ${{ github.event.inputs.port_payload }}"

      - name: Simulate Service Creation
        run: |
          echo "Starting automation for Walmart service..."
          sleep 5
          echo "Infrastructure provisioned successfully!"

      - name: Report Status to Port
        uses: port-labs/port-github-action@v1
        with:
          clientId: ${{ secrets.PORT_CLIENT_ID }}
          clientSecret: ${{ secrets.PORT_CLIENT_SECRET }}
          operation: PATCH_RUN
          runId: ${{ github.event.inputs.port_payload }}
          status: "SUCCESS"
          logMessage: "Service created successfully! ✅"
